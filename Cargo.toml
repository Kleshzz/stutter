[package]
name = "stutter"
version = "0.1.0"
edition = "2021"
description = "Focus-aware process priority daemon for Hyprland"
license = "MIT"
repository = "https://github.com/Kleshzz/stutter"
rust-version = "1.81.0"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1.0"
libc = "0.2"
thiserror = "2"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
panic = "abort"
overflow-checks = false