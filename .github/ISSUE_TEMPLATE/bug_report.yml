name: Bug Report
description: Report a bug in stutter
labels: ["bug"]

body:
  - type: input
    id: version
    attributes:
      label: Version
    validations:
      required: true

  - type: input
    id: compositor
    attributes:
      label: Compositor
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: "Run with `RUST_LOG=debug stutter` and paste output"
      render: text

  - type: textarea
    id: config
    attributes:
      label: Config
      description: Contents of `~/.config/stutter/config.toml`
      render: toml