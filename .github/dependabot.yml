version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "rust"
    versioning-strategy: auto
    groups:
      rust-safe:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      rust-major:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "major"
    commit-message:
      prefix: "chore(dependencies):"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions:
        applies-to: version-updates
        patterns:
          - "*"
    commit-message:
      prefix: "chore(actions):"