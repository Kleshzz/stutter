name: Release
on:
  push:
    tags:
      - "v*"

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          cargo update --workspace

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git diff --staged --quiet || git commit -m "chore: bump version to ${GITHUB_REF_NAME}"
          git push origin main

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          get_section() {
            local prefix="$1"
            git log $RANGE --pretty=format:"%s" \
              | grep "^${prefix}" \
              | grep -v "bump version" \
              | grep -v "update lock" \
              | sed "s/^${prefix}[^:]*: /- /" \
              | sort
          }

          FEATURES=$(get_section "feat")
          FIXES=$(get_section "fix")
          REFACTORS=$(get_section "refactor")

          BODY=""
          [ -n "$FEATURES" ]  && BODY="${BODY}## Features\n${FEATURES}\n\n"
          [ -n "$FIXES" ]     && BODY="${BODY}## Bug Fixes\n${FIXES}\n\n"
          [ -n "$REFACTORS" ] && BODY="${BODY}## Refactors\n${REFACTORS}\n\n"

          if [ -z "$BODY" ]; then
            BODY="No notable changes."
          fi

          printf "%b" "$BODY" > changelog.md
          cat changelog.md

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v7
        with:
          name: changelog
          path: changelog.md

  build:
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release

      - name: Download changelog
        uses: actions/download-artifact@v8
        with:
          name: changelog

      - name: Upload binary
        uses: softprops/action-gh-release@v3
        with:
          files: target/release/stutter
          body_path: changelog.md

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish to crates.io
        run: cargo publish --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  aur:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Update AUR package
        uses: KSXGitHub/github-actions-deploy-aur@v4
        with:
          pkgname: stutter-git
          pkgbuild: ./pkg/PKGBUILD
          commit_username: github-actions[bot]
          commit_email: 41898282+github-actions[bot]@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "chore: update to ${{ github.ref_name }}"
          force_push: true