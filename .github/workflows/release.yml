name: Release
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set version from tag
        if: github.event_name == 'push'
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          cargo update --workspace

      - name: Commit version bump
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git diff --staged --quiet || git commit -m "chore: bump version to ${GITHUB_REF_NAME}"
          git push origin HEAD:main

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v3
        with:
          files: target/release/stutter
          generate_release_notes: true

  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish to crates.io
        run: cargo publish --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  aur:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Install dependencies
        run: sudo apt-get install -y openssh-client git

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config << EOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
          EOF

      - name: Clone AUR repo
        run: git clone ssh://aur@aur.archlinux.org/stutter-git.git /tmp/aur-pkg

      - name: Update PKGBUILD
        run: |
          cp ./pkg/PKGBUILD /tmp/aur-pkg/PKGBUILD
          cd /tmp/aur-pkg
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Generate .SRCINFO
        run: |
          docker run --rm -v /tmp/aur-pkg:/pkg archlinux:latest bash -c "
            pacman -Sy --noconfirm pacman-contrib &&
            useradd -m builder &&
            chown -R builder:builder /pkg &&
            su builder -c 'cd /pkg && makepkg --printsrcinfo > .SRCINFO'
          "

      - name: Commit and push
        run: |
          cd /tmp/aur-pkg
          git add PKGBUILD .SRCINFO
          git diff --staged --quiet || git commit -m "chore: update to ${{ github.ref_name }}"
          git push