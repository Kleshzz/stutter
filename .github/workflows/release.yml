name: Release
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true
  push:
    tags:
      - "v*"

jobs:
  changelog:
    uses: ./.github/workflows/changelog.yml
    with:
      tag: ${{ github.event.inputs.tag || github.ref_name }}

  build:
    needs: changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set version from tag
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          VERSION=${TAG_NAME#v}
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          cargo update --workspace

      - name: Commit version bump
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git diff --staged --quiet || git commit -m "chore: bump version to ${TAG_NAME}"
          git push origin HEAD:main

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release

      - name: Create GitHub Release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: target/release/stutter
          generate_release_notes: true
          body: |
            ${{ needs.changelog.outputs.changelog }}

  publish:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish to crates.io
        run: cargo publish --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  aur:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Install dependencies
        run: sudo apt-get install -y openssh-client git

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config << EOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
          EOF

      - name: Clone AUR repo
        run: git clone ssh://aur@aur.archlinux.org/stutter-git.git /tmp/aur-pkg

      - name: Update PKGBUILD
        run: |
          cp ./pkg/PKGBUILD /tmp/aur-pkg/PKGBUILD
          cd /tmp/aur-pkg
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update PKGBUILD version
        run: |
          VERSION=${{ github.event.inputs.tag || github.ref_name }}
          VERSION=${VERSION#v}
          HASH=$(cd $GITHUB_WORKSPACE && git rev-parse --short HEAD)
          COUNT=$(cd $GITHUB_WORKSPACE && git rev-list --count HEAD)
          PKGVER="${VERSION}.r${COUNT}.g${HASH}"
          sed -i "s/^pkgver=.*/pkgver=${PKGVER}/" /tmp/aur-pkg/PKGBUILD

      - name: Generate .SRCINFO
        run: |
          docker run --rm -v /tmp/aur-pkg:/pkg archlinux:latest bash -c "
            pacman -Sy --noconfirm pacman-contrib &&
            useradd -m builder &&
            chown -R builder:builder /pkg &&
            su builder -c 'cd /pkg && makepkg --printsrcinfo > .SRCINFO'
          "
          sudo chown -R $USER:$USER /tmp/aur-pkg

      - name: Commit and push
        run: |
          cd /tmp/aur-pkg
          TAG_NAME=${{ github.event.inputs.tag || github.ref_name }}
          git add PKGBUILD .SRCINFO
          git diff --staged --quiet || git commit -m "chore: update to ${TAG_NAME}"
          git push