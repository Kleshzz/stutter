name: Generate Changelog
on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
    outputs:
      changelog:
        description: "Generated changelog"
        value: ${{ jobs.changelog.outputs.changelog }}

jobs:
  changelog:
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.generate.outputs.changelog }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Generate changelog
        id: generate
        env:
          TAG_NAME: ${{ inputs.tag }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG_NAME}^" 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            RANGE="${TAG_NAME}"
          else
            RANGE="${PREV_TAG}..${TAG_NAME}"
          fi

          capitalize() {
            echo "$1" | awk '{ $1=toupper(substr($1,1,1))substr($1,2); print }'
          }

          FEAT=$(git log $RANGE --pretty=format:"%s (%h)" --grep="^feat" | grep -v "^feat(dev)" | sed 's|^feat: ||;s|^feat(||' | while IFS= read -r line; do echo "- $(capitalize "$line")"; done)
          FIX=$(git log $RANGE --pretty=format:"%s (%h)" --grep="^fix" | grep -v "^fix(dev)" | sed 's|^fix: ||;s|^fix(||' | while IFS= read -r line; do echo "- $(capitalize "$line")"; done)
          REFACTOR=$(git log $RANGE --pretty=format:"%s (%h)" --grep="^refactor" | grep -v "^refactor(dev)" | sed 's|^refactor: ||;s|^refactor(||' | while IFS= read -r line; do echo "- $(capitalize "$line")"; done)
          DOCS=$(git log $RANGE --pretty=format:"%s (%h)" --grep="^docs" | grep -v "^docs(dev)" | sed 's|^docs: ||;s|^docs(||' | while IFS= read -r line; do echo "- $(capitalize "$line")"; done)

          CHANGELOG=""

          if [ -n "$FEAT" ]; then
            CHANGELOG="${CHANGELOG}## Features\n${FEAT}\n\n"
          fi
          if [ -n "$FIX" ]; then
            CHANGELOG="${CHANGELOG}## Bug Fixes\n${FIX}\n\n"
          fi
          if [ -n "$REFACTOR" ]; then
            CHANGELOG="${CHANGELOG}## Refactor\n${REFACTOR}\n\n"
          fi
          if [ -n "$DOCS" ]; then
            CHANGELOG="${CHANGELOG}## Docs\n${DOCS}\n\n"
          fi

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="No changes."
          fi

          {
            echo "changelog<<EOF"
            echo -e "$CHANGELOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT