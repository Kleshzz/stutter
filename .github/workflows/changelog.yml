name: Generate Changelog
on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
    outputs:
      changelog:
        description: "Generated changelog"
        value: ${{ jobs.changelog.outputs.changelog }}

jobs:
  changelog:
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.generate.outputs.changelog }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Generate changelog
        id: generate
        env:
          TAG_NAME: ${{ inputs.tag }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG_NAME}^" 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            RANGE="${TAG_NAME}"
          else
            RANGE="${PREV_TAG}..${TAG_NAME}"
          fi

          FEAT=$(git log $RANGE --pretty=format:"%s (%h)" --grep="^feat" \
            | grep -v "^feat(dev)" \
            | sed 's|^feat: ||;s|^feat([^)]*): ||' \
            | awk '{ print "- " toupper(substr($0,1,1)) substr($0,2) }')

          FIX=$(git log $RANGE --pretty=format:"%s (%h)" --grep="^fix" \
            | grep -v "^fix(dev)" \
            | sed 's|^fix: ||;s|^fix([^)]*): ||' \
            | awk '{ print "- " toupper(substr($0,1,1)) substr($0,2) }')

          REFACTOR=$(git log $RANGE --pretty=format:"%s (%h)" --grep="^refactor" \
            | grep -v "^refactor(dev)" \
            | sed 's|^refactor: ||;s|^refactor([^)]*): ||' \
            | awk '{ print "- " toupper(substr($0,1,1)) substr($0,2) }')

          DOCS=$(git log $RANGE --pretty=format:"%s (%h)" --grep="^docs" \
            | grep -v "^docs(dev)" \
            | sed 's|^docs: ||;s|^docs([^)]*): ||' \
            | awk '{ print "- " toupper(substr($0,1,1)) substr($0,2) }')

          {
            echo "changelog<<EOF"
            [ -n "$FEAT" ] && printf "## Features\n%s\n\n" "$FEAT"
            [ -n "$FIX" ] && printf "## Bug Fixes\n%s\n\n" "$FIX"
            [ -n "$REFACTOR" ] && printf "## Refactor\n%s\n\n" "$REFACTOR"
            [ -n "$DOCS" ] && printf "## Docs\n%s\n\n" "$DOCS"
            if [ -z "$FEAT" ] && [ -z "$FIX" ] && [ -z "$REFACTOR" ] && [ -z "$DOCS" ]; then
              echo "No changes."
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"